version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
    restart: unless-stopped

  chatbot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.chatbot
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
